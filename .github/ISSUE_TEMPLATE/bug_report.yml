name: Bug report
description: Report a defect in probe logic, the API, the website, or data correctness.
title: "[LLMS-] bug: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.
        Please include enough detail that we can reproduce the problem.

        **Not for security issues** — see [SECURITY.md](../../SECURITY.md).
        **Not for disputes over provider data** — email `methodology@llmstatus.io` instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call `curl https://llmstatus.io/api/v1/providers/openai/history?window=30d`
        2. Observe the returned `uptime` field is 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: If running locally, output of `git rev-parse HEAD`.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Node version (`go version`, `node --version`) if running locally.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant output. Redact secrets.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I am not reporting a security vulnerability
          required: true

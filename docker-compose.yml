# llmstatus.io — local development environment (Go + Next.js stack)
#
# Services:
#   db       — PostgreSQL 17 (relational state: providers, incidents)
#   influx   — InfluxDB 3 Core (time-series probe samples)
#   migrate  — one-shot migration runner; exits 0 when done
#
# FIXED HOST PORTS (do not change — chosen to avoid conflicts on this host):
#   db       — PostgreSQL 17        host:15432 → container:5432
#   influx   — InfluxDB 3 Core      host:18086 → container:8181
#   ingest   — probe ingest API     host:18080 → container:8080
#   api      — public read API      host:18081 → container:8081
#   web      — Next.js frontend     host:13000 → container:3000
#
# First-time setup:
#   cp .env.example .env
#   cp web/.env.local.example web/.env.local
#   docker compose up -d db influx
#   docker compose run --rm migrate
#   docker compose up -d api ingest detector
#   cd web && npm run dev          # browser → http://localhost:13000
#
# Usage:
#   docker compose up -d            # start all services
#   docker compose logs -f api      # tail a service
#   docker compose down -v          # stop and wipe volumes

services:

  # ── data stores ────────────────────────────────────────────────────────────

  db:
    image: postgres:17-alpine
    container_name: llmstatus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: llmstatus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmstatus}
      POSTGRES_DB: llmstatus
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmstatus"]
      interval: 10s
      timeout: 5s
      retries: 5

  influx:
    image: influxdb:3-core
    container_name: llmstatus-influx
    restart: unless-stopped
    command: serve --without-auth
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: ${REGION_ID:-local-dev}
    volumes:
      - ${INFLUX_DATA_DIR:-./data/influx}:/var/lib/influxdb3
    ports:
      - "18086:8181"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── one-shot migration runner ───────────────────────────────────────────────

  migrate:
    image: ghcr.io/llmstatus/llmstatus-migrate:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: migrate
    container_name: llmstatus-migrate
    environment:
      DATABASE_URL: pgx5://llmstatus:${POSTGRES_PASSWORD:-llmstatus}@db:5432/llmstatus?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Go services ────────────────────────────────────────────────────────────

  ingest:
    image: ghcr.io/llmstatus/llmstatus-ingest:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: ingest
    container_name: llmstatus-ingest
    restart: unless-stopped
    environment:
      INFLUX_HOST: http://influx:8181
      INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-token}
      INFLUX_DATABASE: ${INFLUX_DATABASE:-probes}
      INGEST_ADDR: ":8080"
    depends_on:
      influx:
        condition: service_healthy
    ports:
      - "18080:8080"

  detector:
    image: ghcr.io/llmstatus/llmstatus-detector:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: detector
    container_name: llmstatus-detector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://llmstatus:${POSTGRES_PASSWORD:-llmstatus}@db:5432/llmstatus?sslmode=disable
      INFLUX_HOST: http://influx:8181
      INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-token}
      INFLUX_DATABASE: ${INFLUX_DATABASE:-probes}
      DETECTOR_INTERVAL: ${DETECTOR_INTERVAL:-60s}
    depends_on:
      db:
        condition: service_healthy
      influx:
        condition: service_healthy

  api:
    image: ghcr.io/llmstatus/llmstatus-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: api
    container_name: llmstatus-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://llmstatus:${POSTGRES_PASSWORD:-llmstatus}@db:5432/llmstatus?sslmode=disable
      INFLUX_HOST: http://influx:8181
      INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-token}
      INFLUX_DATABASE: ${INFLUX_DATABASE:-probes}
      API_ADDR: ":8081"
      API_RATE_LIMIT: ${API_RATE_LIMIT:-60}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@llmstatus.io}
    depends_on:
      db:
        condition: service_healthy
      influx:
        condition: service_healthy
    ports:
      - "18081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  notifier:
    image: ghcr.io/llmstatus/llmstatus-notifier:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: notifier
    container_name: llmstatus-notifier
    restart: on-failure
    environment:
      DATABASE_URL: postgres://llmstatus:${POSTGRES_PASSWORD:-llmstatus}@db:5432/llmstatus?sslmode=disable
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@llmstatus.io}
      SITE_URL: ${SITE_URL:-https://llmstatus.io}
      NOTIFIER_POLL_INTERVAL: ${NOTIFIER_POLL_INTERVAL:-30s}
    depends_on:
      db:
        condition: service_healthy

  # ── frontend ───────────────────────────────────────────────────────────────

  web:
    image: ghcr.io/llmstatus/llmstatus-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    container_name: llmstatus-web
    restart: unless-stopped
    environment:
      API_URL: http://api:8081
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:13000}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "13000:3000"

  # ── probe runner ──────────────────────────────────────────────────────────

  prober:
    image: ghcr.io/llmstatus/llmstatus-prober:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.golang
      args:
        CMD: prober
    container_name: llmstatus-prober
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://llmstatus:${POSTGRES_PASSWORD:-llmstatus}@db:5432/llmstatus?sslmode=disable
      REGION_ID: ${REGION_ID:-local-dev}
      PROBE_INTERVAL: ${PROBE_INTERVAL:-60s}
      PROBE_TIMEOUT: ${PROBE_TIMEOUT:-30s}
      PROBE_CONCURRENCY: ${PROBE_CONCURRENCY:-4}
      INGEST_URL: http://ingest:8080/v1/probe
      LLMS_OPENAI_API_KEY: ${LLMS_OPENAI_API_KEY:-}
      LLMS_ANTHROPIC_API_KEY: ${LLMS_ANTHROPIC_API_KEY:-}
      LLMS_DEEPSEEK_API_KEY: ${LLMS_DEEPSEEK_API_KEY:-}
      LLMS_GEMINI_API_KEY: ${LLMS_GEMINI_API_KEY:-}
      LLMS_MISTRAL_API_KEY: ${LLMS_MISTRAL_API_KEY:-}
      LLMS_GROQ_API_KEY: ${LLMS_GROQ_API_KEY:-}
      LLMS_XAI_API_KEY: ${LLMS_XAI_API_KEY:-}
      LLMS_TOGETHER_API_KEY: ${LLMS_TOGETHER_API_KEY:-}
      LLMS_PERPLEXITY_API_KEY: ${LLMS_PERPLEXITY_API_KEY:-}
      LLMS_COHERE_API_KEY: ${LLMS_COHERE_API_KEY:-}
      LLMS_MOONSHOT_API_KEY: ${LLMS_MOONSHOT_API_KEY:-}
      LLMS_ZHIPU_API_KEY: ${LLMS_ZHIPU_API_KEY:-}
      LLMS_ZEROONE_API_KEY: ${LLMS_ZEROONE_API_KEY:-}
      LLMS_QWEN_API_KEY: ${LLMS_QWEN_API_KEY:-}
      LLMS_FIREWORKS_API_KEY: ${LLMS_FIREWORKS_API_KEY:-}
      LLMS_HUGGINGFACE_API_KEY: ${LLMS_HUGGINGFACE_API_KEY:-}
      LLMS_MINIMAX_API_KEY: ${LLMS_MINIMAX_API_KEY:-}
      LLMS_DOUBAO_API_KEY: ${LLMS_DOUBAO_API_KEY:-}
      LLMS_AZURE_OPENAI_API_KEY: ${LLMS_AZURE_OPENAI_API_KEY:-}
      LLMS_AZURE_OPENAI_RESOURCE: ${LLMS_AZURE_OPENAI_RESOURCE:-}
      LLMS_AZURE_OPENAI_DEPLOYMENT: ${LLMS_AZURE_OPENAI_DEPLOYMENT:-}
      LLMS_AZURE_OPENAI_API_VERSION: ${LLMS_AZURE_OPENAI_API_VERSION:-}
      LLMS_AI21_API_KEY: ${LLMS_AI21_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      ingest:
        condition: service_started
